
  <html>
  <head>
    <style>
      body {
        font-family: 'Arial', sans-serif;
        background-color: transparent;
        color: #ffffff;
        margin: 0;
        padding: 0;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th, td {
        padding: 10px;
        border-bottom: 1px solid #444;
        text-align: left;
        color: #ffffff;
        white-space: nowrap;
      }
      .table-wrapper {
        overflow-x: auto;
        width: 100%;
      }
      .rank {
        font-weight: bold;
        color: #00BFFF;
        font-size: 18px;
      }
      .card-popup {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) rotateY(0deg);
        width: 240px;
        height: 300px;
        perspective: 1000px;
        z-index: 9999;
        display: none;
      }
      .card-inner {
        width: 100%;
        height: 100%;
        transition: transform 0.8s;
        transform-style: preserve-3d;
        position: relative;
      }
      .card-inner.flipped {
        transform: rotateY(180deg);
      }
      .card-front, .card-back {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        border: 2px solid #00BFFF;
        border-radius: 12px;
        box-shadow: 0 0 20px #00BFFF;
      }
      .card-back {
        transform: rotateY(180deg);
      }
      .card-popup img {
        width: 100%;
        height: 100%;
        border-radius: 12px;
        object-fit: cover;
      }
      .card-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(0, 0, 0, 0.6);
        z-index: 9998;
        display: none;
      }
      .glow-link {
        color: #ffffff;
        cursor: pointer;
        text-decoration: underline;
        transition: text-shadow 0.3s;
      }
      .glow-link:hover {
        text-shadow: 0 0 8px #ffffff;
      }
      .title-animate {
        text-align: center;
        font-size: 36px;
        color: #00BFFF;
        font-family: 'Rubik Mono One', sans-serif;
        animation: glow 1.5s ease-in-out infinite alternate;
      }
      @keyframes glow {
        from { text-shadow: 0 0 10px #00BFFF; }
        to   { text-shadow: 0 0 20px #00BFFF; }
      }

      /* outside keyframes */
      .link-wrapper { position: relative; display: inline-block; }

      .arrow {
        position: absolute;
        left: -20px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 18px;
        color: #00BFFF;
        opacity: 0;
        animation: arrowFade 3s ease-out forwards;
      }

      @keyframes arrowFade {
        0% { opacity: 1; left: -30px; }
        100% { opacity: 0; left: -20px; }
      }
    </style>
  </head>
  <body>
    <h1 class="title-animate">Rapatois Gradebook Top 20</h1>
    <div style="text-align: center; margin-top: 20px;">
      <img src="https://raw.githubusercontent.com/Dbecton17/diamondcharts-leaderboard/main/diamond_banner.png" 
           alt="Banner" 
           style="max-width: 100%; height: auto; border-radius: 12px;" />
    </div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Rank</th>
            <th>Album</th>
            <th>Artist</th>
            <th>Genre</th>
            <th>Grade</th>
          </tr>
        </thead>
        <tbody>
          
        </tbody>
      </table>
    </div>

    <div class="card-overlay" id="overlay" onclick="hideCard()"></div>
    <div class="card-popup" id="popup">
      <div class="card-inner" id="card">
        <div class="card-front">
          <img id="frontImg" src="" />
        </div>
        <div class="card-back">
          <img id="backImg" src="" />
        </div>
      </div>
    </div>

    <script>
      // Arrow cue
      window.addEventListener('DOMContentLoaded', () => {
        const arrow = document.querySelector('.arrow');
        if (arrow) arrow.style.opacity = 1;
        setTimeout(() => {
          document.querySelectorAll('.arrow').forEach(el => el.remove());
        }, 3000);
      });

      // Card flip logic
      let flipped = false;
      function showCard(front, back) {
        document.getElementById('frontImg').src = encodeURI(front);
        document.getElementById('backImg').src = encodeURI(back);
        document.getElementById('popup').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('card').classList.remove('flipped');
        flipped = false;
      }
      document.getElementById('popup').addEventListener('click', function () {
        flipped = !flipped;
        document.getElementById('card').classList.toggle('flipped');
      });
      function hideCard() {
        document.getElementById('popup').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
      }

      // Option B: combine auto-resize logic here
      (function () {
        function postHeight() {
          var h = Math.max(
            document.body.scrollHeight,
            document.documentElement.scrollHeight
          );
          parent.postMessage({ type: 'DIAMOND_HEIGHT', height: h }, '*');
        }
        window.addEventListener('load', postHeight);
        if ('ResizeObserver' in window) {
          new ResizeObserver(postHeight).observe(document.body);
        } else {
          setInterval(postHeight, 500);
        }
        setTimeout(postHeight, 300);
      })();
    </script>
  </body>
  </html>
